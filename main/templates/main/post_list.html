{% extends 'base.html' %}

{% block title %}Посты{% endblock %}

{% block content %}
    <article>
        {% for post in posts %}
            <a href="{% url 'post_detail' post.slug %}">
                <h2>{{ post.title }}</h2>
                <p>{{ post.content }}</p>
                <p>{{ post.created_at|date:'d E Y H:i' }}</p>
            </a>
        {% endfor %}
    </article>
{% endblock %}
