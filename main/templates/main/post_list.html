{% extends 'base.html' %}

{% block title %}Посты{% endblock %}

{% block content %}
    <article>
        {% for post in posts %}
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <p>{{ post.created_at|date:'d E Y H:i' }}</p>
        {% endfor %}
    </article>
{% endblock %}
