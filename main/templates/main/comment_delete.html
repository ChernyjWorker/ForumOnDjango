{% extends "base.html" %}

{% block title %}Удаление комментария{% endblock title %}

{% block content %}
    <div class="alert alert-warning">
        <h4>Внимание!</h4>
        <p>Вы уверены, что хотите удалить комментарий?</p>
        <p class="text-muted">Это действие нельзя отменить.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{{ object.get_absolute_url }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock content %}
