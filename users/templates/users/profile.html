{% extends "base.html" %}
{% load static %}

{% block titile %}{{profile_user.get_username}}{% endblock titile %}
{% block content %}
    <div class="profile-block">
        <img src="{% if avatar %}{{ profile_user.avatar.url }}{% else %}{% static 'images/default.png'%}{% endif %}" alt="avatar" class="profile-avatar">
        <p class="username">{{ profile_user.get_username }}</p>
    </div>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Выйти</button>
    </form>
{% endblock content %}
